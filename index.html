<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Undangan Bukber Ramadhan</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f2027;
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    /* opening */

    #opening {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(#0f2027, #203a43);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    #opening button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #ffd369;
      cursor: pointer;
    }

    /* container */

    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }

    /* masjid SVG */

    .masjid {
      width: 200px;
      margin: auto;
      animation: gerakMasjid 3s infinite alternate;
    }

    @keyframes gerakMasjid {
      from {
        transform: translateY(0)
      }

      to {
        transform: translateY(10px)
      }
    }

    /* lampu */

    .lamp {
      font-size: 40px;
      animation: goyang 2s infinite alternate;
    }

    @keyframes goyang {
      from {
        transform: rotate(-5deg)
      }

      to {
        transform: rotate(5deg)
      }
    }

    /* galeri */

    .galeri img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* star */

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      animation: jatuh linear infinite;
    }

    @keyframes jatuh {
      from {
        transform: translateY(-10px)
      }

      to {
        transform: translateY(100vh)
      }
    }
  </style>
</head>

<body>

  <div id="opening">

    <h1>Undangan Bukber Ramadhan</h1>
    <button onclick="buka()">Buka Undangan</button>

  </div>

  <div class="container" id="isi" style="display:none">

    <div class="lamp">🏮</div>

    <!-- masjid svg -->

    <svg class="masjid" viewBox="0 0 64 64" fill="gold">
      <path d="M32 2l10 10h-6v12h-8V12h-6z" />
      <rect x="10" y="24" width="44" height="28" fill="gold" />
    </svg>

    <h2 id="nama"></h2>

    <p>Assalamu'alaikum Wr. Wb.</p>

    <p>Mari hadir di acara <b>Buka Puasa Bersama</b></p>

    <p>
      📅 Sabtu, 18 Maret 2026<br>
      🕔 17:30 WIB<br>
      📍 Aula / Rumah / Sekolah
    </p>

    <h3>Dress Code</h3>

    <p>
      🤍 Putih / Cream<br>
      🕌 Busana Muslim / Muslimah
    </p>

    <h3>Rangkaian Acara</h3>

    <p>
      Buka Bersama<br>
      Games<br>
      Best Costume<br>
      Door Prizes
    </p>

    <h3>Galeri</h3>

    <div class="galeri">

      <img src="https://images.unsplash.com/photo-1584556812952-905ffd0f47d2">
      <img src="https://images.unsplash.com/photo-1587614382346-ac0c5c52a6d1">

    </div>

    <h3>Lokasi</h3>

    <iframe width="100%" height="250" style="border:0" loading="lazy" allowfullscreen
      src="https://maps.google.com/maps?q=Serang&t=&z=13&ie=UTF8&iwloc=&output=embed">
    </iframe>

  </div>

  <audio id="musik" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_8c0dfe6f25.mp3">
  </audio>

  <script>

    /* buka undangan */

    function buka() {

      document.getElementById("opening").style.display = "none"
      document.getElementById("isi").style.display = "block"

      document.getElementById("musik").play()

    }

    /* nama tamu */

    const params = new URLSearchParams(window.location.search)

    let tamu = params.get("to")

    if (tamu) {
      document.getElementById("nama").innerHTML = "Kepada: " + tamu
    }

    /* bintang jatuh */

    for (let i = 0; i < 40; i++) {

      let star = document.createElement("div")

      star.className = "star"

      star.style.left = Math.random() * 100 + "vw"

      star.style.animationDuration = (2 + Math.random() * 3) + "s"

      document.body.appendChild(star)

    }

  </script>

</body>

</html>
